pipeline {
    agent any

    environment {
        BACKEND_IMAGE = "naveen9521/smart-voting-backend"
        FRONTEND_IMAGE = "naveen9521/smart-voting-frontend"
        BUILD_TAG = "${BUILD_NUMBER}"

        VENV_DIR = ".venv"
        PATH = "${WORKSPACE}/.venv/bin:${env.PATH}"
    }

    stages {

        stage('Checkout Latest Code') {
            steps {
                git branch: 'main',
                    url: 'https://github.com/naveensaini9521/smart_voting_system_with_face_recognition.git'
            }
        }

        stage('Setup Virtual Environment') {
            steps {
                sh '''
                python3 -m venv .venv
                . .venv/bin/activate
                pip install --upgrade pip
                pip install -r requirements.txt
                pip install black flake8 pytest
                '''
            }
        }

        stage('Black Validation') {
            steps {
                sh '''
                . .venv/bin/activate
                black --check .
                echo "Black formatting OK"
                '''
            }
        }

        stage('Flake8 Linting') {
            steps {
                sh '''
                . .venv/bin/activate
                flake8 .
                '''
            }
        }

        stage('Run Tests') {
            steps {
                sh '''
                . .venv/bin/activate
                export PYTHONPATH=$WORKSPACE
                pytest -v
                '''
            }
        }

        stage('SonarQube Scan') {
            steps {
                withSonarQubeEnv('sonarqube') {
                    sh '''
                    /opt/sonar-scanner/bin/sonar-scanner \
                      -Dsonar.projectKey=smart-voting-system \
                      -Dsonar.projectName=smart-voting-system \
                      -Dsonar.python.version=3.11
                    '''
                }
            }
        }

        stage('Verify Compose File') {
            steps {
                sh '''
                pwd
                ls -la
                test -f docker-compose.yaml
                '''
            }
        }

        stage('Build Images') {
            steps {
                sh '''
                docker compose build
                '''
            }
        }

        stage('Docker Login') {
            steps {
                withCredentials([usernamePassword(
                    credentialsId: 'dockerhub-creds',
                    usernameVariable: 'DOCKER_USER',
                    passwordVariable: 'DOCKER_PASS'
                )]) {
                    sh '''
                    echo "$DOCKER_PASS" | docker login \
                        -u "$DOCKER_USER" \
                        --password-stdin
                    '''
                }
            }
        }

        stage('Push Images') {
            steps {
                sh '''
                docker compose push
                '''
            }
        }
    }

    post {
        success {
            echo 'CI Pipeline completed successfully'
        }

        failure {
            echo 'CI Pipeline failed'
        }

        always {
            sh '''
            docker logout || true
            rm -rf .venv || true
            '''
            cleanWs()
        }
    }
}