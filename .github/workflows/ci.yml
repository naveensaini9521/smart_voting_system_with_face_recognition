name: CI

on:
  push:
    brances:
      - main

  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: smart_app/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          pyhon-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Verify Python Syntax
        run: |
          pyhon -m py_compile app.py_compile

      - name: Build Backend Image
        run: |
          docker Build -t voting-backend .

      - name: Check Syntax
        run: |
          python -m compileall .

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: smart_app/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Frontend Image
        run: |
          docker build -t voting-frontend .
