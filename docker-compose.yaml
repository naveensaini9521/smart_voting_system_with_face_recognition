services:
  frontend:
    # platform: linux/arm64
    build:
      context: ./smart_app/frontend
      dockerfile: Dockerfile
    container_name: react-frontend
    ports:
      - "80:80"
      - "443:443"
    security_opt:
      - seccomp:unconfined
    restart: always
    depends_on:
      - backend
    networks:
      - voting-network

    mem_limit: 256m
    cpus: 0.50
    cpuset: "0-1"

  backend:
    # platform: linux/arm64
    hostname: backend
    build:
      context: ./smart_app/backend
      dockerfile: Dockerfile
    container_name: voting-system

    expose:
      - "5000"
    environment:
      - ENVIRONMENT=PRODUCTION
      - MONGO_URI=mongodb://mongo:27017/smart_voting_system
      - SECRET_KEY=eb153fcfa5a755ae94a949f86fbbaa5c53cd2b7faf5c848ba09307d2f7acdce1
      - JWT_SECRET_KEY=sUJbaMMUAKYojj0dFe94jO-ld2oc028u3qw2KU71Ui0

    depends_on:
      - mongo
    restart: always
    networks:
      - voting-network

    mem_limit: 512m
    cpus: 1.0
    cpuset: "0-3"

  mongo:
    # platform: linux/arm64
    image: mongo:7
    container_name: voting-system-mongo

    expose:
      - "27017"

    volumes:
      - mongo_data:/data/db
      - ./backup:/backup

    restart: always
    networks:
      - voting-network

    mem_limit: 1g
    cpus: 1.0
    cpuset: "0-3"

    command: ["mongod", "--wiredTigerCacheSizeGB=0.25"]

volumes:
  mongo_data:

networks:
  voting-network:
    driver: bridge
