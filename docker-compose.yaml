version: "3.9"

x-backend-image: &backend-image
  image: naveen9521/smart-voting-backend:latest
  build:
    context: ./smart_app/backend

services:
  frontend:
    image: naveen9521/smart-voting-frontend:latest
    build:
      context: ./smart_app/frontend
      dockerfile: Dockerfile

    container_name: react-frontend

    ports:
      - "80:80"
      - "443:443"

    restart: unless-stopped

    depends_on:
      backend_1:
        condition: service_healthy
      backend_2:
        condition: service_healthy
      backend_3:
        condition: service_healthy

    networks:
      - voting-network

    security_opt:
      - no-new-privileges:true

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --quiet --tries=1 --spider http://localhost || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    mem_limit: 256m
    cpus: 0.50
    cpuset: "0-1"

  backend_1:
    <<: *backend-image
    container_name: backend_1

    env_file:
      - .env

    restart: unless-stopped

    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - voting-network

    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    mem_limit: 512m
    cpus: 1.0

  backend_2:
    <<: *backend-image
    container_name: backend_2

    env_file:
      - .env

    restart: unless-stopped

    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - voting-network

    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    mem_limit: 512m
    cpus: 1.0

  backend_3:
    <<: *backend-image
    container_name: backend_3

    env_file:
      - .env

    restart: unless-stopped

    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - voting-network

    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    mem_limit: 512m
    cpus: 1.0

  redis:
    image: redis:7-alpine
    container_name: voting-redis

    restart: unless-stopped

    networks:
      - voting-network

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

    mem_limit: 256m
    cpus: 0.5

  mongo:
    image: mongo:7
    container_name: voting-system-mongo

    expose:
      - "27017"

    volumes:
      - mongo_data:/data/db
      - ./backup:/backup

    restart: unless-stopped

    networks:
      - voting-network

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

    mem_limit: 1g
    cpus: 1.0
    cpuset: "0-3"

    command:
      - mongod
      - --wiredTigerCacheSizeGB=0.25

volumes:
  mongo_data:

networks:
  voting-network:
    driver: bridge
