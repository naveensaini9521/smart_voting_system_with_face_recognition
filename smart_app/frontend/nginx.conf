worker_processes auto;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # PERFORMANCE TUNING
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    aio on;
    # aio_write off;     
    # sendfile off;
    # directio off;

    # open_file_cache off;

    open_file_cache max=2000 inactive=30s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    map_hash_bucket_size 128;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;
    
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # STATIC CACHE CONTROL

    map $sent_http_content_type $expires {
        default off;
        text/css 30d;
        application/javascript 30d;
        image/svg+xml 30d;
        image/png 30d;
        image/jpg 30d;
        image/jpeg 30d;
    }

    upstream backend {
        least_conn;

        server backend_1:5000 max_fails=3 fail_timeout=10s;
        server backend_2:5000 max_fails=3 fail_timeout=10s;
        server backend_3:5000 max_fails=3 fail_timeout=10s;

        keepalive 32;
    }

    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/votingsystem.local.pem;
        ssl_certificate_key /etc/nginx/ssl/votingsystem.local-key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
            expires $expires;
            add_header Cache-Control "public, no-transform";

        }

        location /api/ {
            proxy_pass http://backend;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;

            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        }


        location /socket.io/ {
            proxy_pass http://backend;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_buffering off;
            proxy_cache_bypass $http_upgrade;

            proxy_read_timeout 3600s;
        }
    }
}